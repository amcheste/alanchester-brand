name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: validate tokens.json
        run: node -e "JSON.parse(require('fs').readFileSync('tokens/tokens.json','utf8')); console.log('tokens/tokens.json: ok');"

      - name: validate svg assets
        run: |
          set -e
          shopt -s nullglob
          count=0
          for f in assets/*.svg; do
            xmllint --noout "$f"
            echo "$f: ok"
            count=$((count+1))
          done
          if [ "$count" -eq 0 ]; then
            echo "no svgs found in assets/" >&2
            exit 1
          fi
          echo "validated $count svg(s)"

      - name: verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "tag $GITHUB_REF_NAME (version $TAG_VERSION) does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi
          echo "tag and package.json agree on $PKG_VERSION"

      - name: publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
